<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>波比小说 - 尽享品质阅读</title>
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/sdYKDmWK/IMG-8552.png">
    <link rel="icon" type="image/png" href="https://i.ibb.co/sdYKDmWK/IMG-8552.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="波比小说">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #F9644B; 
            --primary-light: #ffedea;
            --bg-home: #FFF9ED; 
            --bg-reader: #FDF6E3;
            --text-main: #2C2C2C;
            --text-mute: #A09581;
            --card-bg: #FFFFFF;
            --nav-bg: rgba(255, 249, 237, 0.92);
            --border-color: #E8E2D5;
            --shadow: 0 8px 20px rgba(0,0,0,0.04);
            --reader-text: #2C2C2C;
            --reader-font-size: 22px; 
        }

        [data-theme="dark"] {
            --bg-home: #121212;
            --bg-reader: #1A1917;
            --text-main: #E0E0E0;
            --text-mute: #757575;
            --card-bg: #1E1E1E;
            --nav-bg: rgba(18, 18, 18, 0.92);
            --border-color: #2C2C2C;
            --reader-text: #D6D2C9;
            --primary-light: #2c1a17;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100%; width: 100%; overflow: hidden; background: var(--bg-home);
            font-family: "PingFang SC", "STHeiti", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            transition: background 0.4s ease;
        }

        #app-content { height: calc(100% - 75px); overflow-y: auto; padding-bottom: 20px; -webkit-overflow-scrolling: touch; }
        .page { display: none; padding: 20px 20px; max-width: 650px; margin: 0 auto; opacity: 0; transform: translateY(10px); }
        .page.active { display: block; animation: pageIn 0.5s forwards cubic-bezier(0.2, 0.8, 0.2, 1); }

        @keyframes pageIn { to { opacity: 1; transform: translateY(0); } }

        #splash-screen { 
            position: fixed; inset: 0; background: #FFF9ED; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.6s ease;
        }
        .splash-icon {
            width: 120px; height: 120px; border-radius: 40px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(249, 100, 75, 0.3);
            animation: pulse 2.5s infinite ease-in-out;
            background: white; display: flex; align-items: center; justify-content: center;
        }
        .splash-icon img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        .search-area { position: sticky; top: 0; background: var(--bg-home); z-index: 100; padding: 10px 0 20px; }
        .search-bar { display: flex; align-items: center; background: var(--card-bg); padding: 14px 20px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow); transition: 0.3s; }
        .search-bar:focus-within { border-color: var(--primary); transform: translateY(-2px); }
        .search-bar input { border: none; background: transparent; outline: none; flex: 1; margin-left: 12px; font-size: 15px; color: var(--text-main); }

        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border-color); text-align: center; }
        .stat-val { font-size: 22px; font-weight: 900; color: var(--primary); display: block; }
        .stat-label { font-size: 12px; color: var(--text-mute); margin-top: 4px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--nav-bg); backdrop-filter: blur(20px); display: flex; border-top: 1px solid var(--border-color); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text-mute); cursor: pointer; transition: 0.3s; position: relative; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active::after { content: ''; position: absolute; top: 12px; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }
        .nav-item i { margin-bottom: 6px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-item.active i { transform: translateY(-2px) scale(1.1); }

        .book-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 10px; }
        .book-card { cursor: pointer; width: 100%; transition: transform 0.2s; }
        .book-card:active { transform: scale(0.96); }
        .book-cover-container { position: relative; width: 100%; aspect-ratio: 3/4; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 10px; background: var(--border-color); }
        .book-cover { width: 100%; height: 100%; object-fit: cover; }
        .book-title { font-size: 13px; font-weight: 700; line-height: 1.4; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: var(--text-main); }

        .me-header-v4 { display: flex; align-items: center; gap: 20px; margin: 10px 0 30px; }
        .me-avatar-v4 { width: 80px; height: 80px; border-radius: 24px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* Reader Engine */
        #reader-page { position: fixed; inset: 0; background: var(--bg-reader); z-index: 2000; display: none; color: var(--reader-text); }
        #reader-scroll-view { width: 100vw; height: 100vh; position: relative; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
        
        #reader-page.mode-paging #reader-scroll-view { overflow-y: hidden; touch-action: none; }
        #reader-page.mode-scroll #reader-scroll-view { overflow-y: auto; touch-action: pan-y; }

        #reader-page.mode-paging #reader-flow { 
            height: calc(100vh - 110px - env(safe-area-inset-bottom)); 
            margin-top: max(55px, env(safe-area-inset-top));
            column-width: 100vw; 
            column-gap: 0; 
            padding: 0;
            box-sizing: border-box; 
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #reader-page.mode-scroll #reader-flow { 
            height: auto; 
            column-width: auto; 
            margin-top: 0;
            padding: calc(70px + env(safe-area-inset-top)) 0 calc(120px + env(safe-area-inset-bottom)) 0;
            transform: none !important; 
        }

        /* Reading Fonts */
        .font-default { font-family: "PingFang SC", "STHeiti", "Microsoft YaHei", sans-serif; }
        .font-serif { font-family: "Noto Serif SC", "Songti SC", "SimSun", "STSong", serif; }
        .font-kaiti { font-family: "Kaiti SC", "KaiTi", "STKaiti", serif; }

        .chapter-container { margin-bottom: 50px; }
        .reader-content-inner { padding: 0 24px; line-height: 2.0; font-size: var(--reader-font-size); text-align: justify; transition: font-size 0.2s; }
        .reader-content-inner p { margin-bottom: 1.5em; text-indent: 2em; }
        #reader-flow.bold-text .reader-content-inner { font-weight: 700; }
        
        .reader-text-body h2 { padding: 0 24px; font-size: 1.6em; font-weight: 900; color: inherit; margin-bottom: 20px; }
        .chapter-end-tag { padding: 40px 24px 20px; text-align: center; color: var(--text-mute); font-size: 14px; letter-spacing: 2px; }

        /* Reader UI */
        .reader-ui { position: fixed; width: 100%; background: var(--nav-bg); backdrop-filter: blur(25px); z-index: 2200; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .reader-header { top: 0; height: 70px; display: flex; align-items: center; padding: 0 20px; transform: translateY(-100%); border-bottom: 1px solid var(--border-color); padding-top: env(safe-area-inset-top); }
        .reader-footer { bottom: 0; padding: 15px 0 calc(15px + env(safe-area-inset-bottom)); transform: translateY(100%); border-top: 1px solid var(--border-color); }
        .reader-ui.active { transform: translateY(0); }

        #reader-tap-zone { position: fixed; inset: 0; z-index: 2100; display: flex; pointer-events: none; }
        #reader-tap-zone .tap-side, #reader-tap-zone .tap-middle { pointer-events: auto; }
        .tap-side { width: 25%; height: 100%; cursor: pointer; }
        .tap-middle { flex: 1; height: 100%; cursor: pointer; }
        
        #reader-page.mode-scroll #reader-tap-zone { display: none; }

        /* Overlays */
        .overlay { position: fixed; bottom: 0; width: 100%; height: 0; background: var(--nav-bg); z-index: 2300; transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 30px 30px 0 0; overflow: hidden; }
        .overlay.active { height: 75%; }
        .overlay-header { padding: 25px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 18px; }

        .setting-row { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .bg-dot { width: 38px; height: 38px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; }
        .bg-dot.active { border-color: var(--primary); transform: scale(1.1); }

        .mode-btn { padding: 8px 16px; border-radius: 12px; border: 1px solid var(--border-color); font-size: 13px; background: var(--card-bg); color: var(--text-main); font-weight: 600; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .mode-btn:active { transform: scale(0.95); }

        #page-hint { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 20px; border-radius: 20px; font-size: 12px; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 3000; font-weight: bold; }
        
        .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ddd; transition: .4s; border-radius: 26px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }

        .feedback-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .feedback-content { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 24px; padding: 25px; }
        .feedback-textarea { width: 100%; height: 150px; border-radius: 16px; border: 1px solid var(--border-color); background: var(--bg-home); padding: 15px; font-size: 15px; color: var(--text-main); outline: none; resize: none; margin: 15px 0; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* Author Profile Specific */
        .author-tag { background: var(--primary-light); display:inline-block; padding: 4px 12px; border-radius: 20px; color: var(--primary); font-weight: 800; font-size: 11px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body class="mode-paging">

    <div id="splash-screen">
        <div class="splash-icon"><img src="https://i.ibb.co/sdYKDmWK/IMG-8552.png"></div>
        <h1 style="color: var(--primary); margin-top: 30px; letter-spacing: 6px; font-weight: 900;">波比小说</h1>
    </div>

    <div id="page-hint"></div>

    <div id="app-content">
        <div id="tab-books" class="page active">
            <div class="search-area">
                <div class="search-bar">
                    <i data-lucide="search" size="20" color="var(--text-mute)"></i>
                    <input type="text" placeholder="搜索书名或作者..." oninput="handleSearch(this.value)">
                </div>
            </div>
            <h2 style="font-size: 20px; font-weight: 900; margin-bottom: 20px;">热门精选</h2>
            <div id="store-grid" class="book-grid"></div>
        </div>

        <div id="tab-shelf" class="page">
            <h2 style="font-size: 24px; font-weight: 900; margin-bottom: 25px;">我的书架</h2>
            <div id="shelf-grid" class="book-grid"></div>
        </div>

        <div id="tab-me" class="page">
            <div class="me-header-v4">
                <img id="me-avatar-img" src="" class="me-avatar-v4">
                <div style="flex: 1;">
                    <div id="me-username" style="font-weight: 900; font-size: 1.4rem;"></div>
                    <div id="me-tagline" style="color: var(--text-mute); font-size: 13px;"></div>
                </div>
            </div>
            <div class="stat-grid">
                <div class="stat-card">
                    <span class="stat-val" id="books-count">0</span>
                    <span class="stat-label">在读书籍</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="total-read-time">0</span>
                    <span class="stat-label">阅读时长(分)</span>
                </div>
            </div>
            <div class="me-list" style="display:flex; flex-direction:column; gap:12px;">
                <div class="me-item" style="display:flex; align-items:center; gap:15px; padding:18px; background:var(--card-bg); border-radius:18px; border:1px solid var(--border-color);">
                    <i data-lucide="moon" color="var(--primary)" size="20"></i>
                    <span style="font-weight:600;">深色模式</span>
                    <label class="switch" style="margin-left:auto;">
                        <input type="checkbox" id="dark-toggle" onchange="toggleDarkMode(this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="me-item" onclick="openFeedback()" style="display:flex; align-items:center; gap:15px; padding:18px; background:var(--card-bg); border-radius:18px; border:1px solid var(--border-color); cursor:pointer;">
                    <i data-lucide="message-square" color="var(--primary)" size="20"></i>
                    <span style="font-weight:600;">意见反馈</span>
                    <i data-lucide="chevron-right" size="18" color="var(--text-mute)" style="margin-left:auto;"></i>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="navTo('books', this)"><i data-lucide="layout-grid"></i><span>书城</span></div>
        <div class="nav-item" onclick="navTo('shelf', this)"><i data-lucide="book-marked"></i><span>书架</span></div>
        <div class="nav-item" onclick="navTo('me', this)"><i data-lucide="user-round"></i><span>我的</span></div>
    </nav>

    <div id="book-detail" style="position:fixed; inset:0; background:var(--bg-home); z-index:1500; display:none; flex-direction:column; transform:translateX(100%); transition:transform 0.5s cubic-bezier(0.1, 0.9, 0.2, 1); padding-top: env(safe-area-inset-top);">
        <div style="padding: 15px 20px;"><i data-lucide="chevron-left" size="30" onclick="closeDetail()" style="cursor:pointer"></i></div>
        <div style="flex: 1; overflow-y: auto; text-align: center; -webkit-overflow-scrolling: touch;">
            
            <img id="det-cover" style="width:140px; aspect-ratio:3/4; border-radius:15px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); display: block; margin: 0 auto 20px auto;">
            
            <div id="det-status-tag" class="author-tag" style="display: none;"></div>
            
            <h2 id="det-title" style="font-weight:900; font-size: 24px; margin-bottom:12px;"></h2>
            
            <div style="display:flex; justify-content:center; align-items:center; gap: 8px; margin-bottom: 15px;">
                <img id="det-author-pfp" style="width:24px; height:24px; border-radius:50%; background:var(--card-bg); object-fit:cover;">
                <p id="det-author" style="color:var(--text-mute); font-size:14px; margin: 0;"></p>
            </div>

            <div style="background: var(--primary-light); display:inline-block; padding: 6px 15px; border-radius: 20px; color: var(--primary); font-weight: bold; font-size: 12px;">
                <i data-lucide="timer" size="14" style="vertical-align:middle;"></i> <span id="cur-timer">00:00:00</span>
            </div>
            <div id="det-desc" style="padding:25px; text-align:left; line-height:1.8; border-top: 1px solid var(--border-color); margin-top:30px; background: var(--card-bg);"></div>
        </div>
        <div style="padding:20px 25px calc(20px + env(safe-area-inset-bottom)); display:flex; gap:15px; background:var(--nav-bg); border-top:1px solid var(--border-color);">
            <button id="shelf-btn" style="flex:1; padding:18px; border-radius:18px; border:2px solid var(--primary); background:transparent; color:var(--primary); font-weight:900;" onclick="toggleShelf()">加入书架</button>
            <button style="flex:2; padding:18px; border-radius:18px; border:none; background:var(--primary); color:white; font-weight:900;" onclick="openReader()">继续阅读</button>
        </div>
    </div>

    <!-- Reader Page -->
    <div id="reader-page">
        <div id="reader-tap-zone">
            <div class="tap-side" onclick="handleReaderTap('prev')"></div>
            <div class="tap-middle" onclick="toggleReaderUI()"></div>
            <div class="tap-side" onclick="handleReaderTap('next')"></div>
        </div>
        <div class="reader-ui reader-header">
            <i data-lucide="chevron-left" size="30" onclick="closeReader()" style="cursor:pointer"></i>
            <span id="reader-title" style="margin-left:15px; font-weight:900; flex:1;"></span>
        </div>
        
        <div id="reader-scroll-view" onscroll="onReaderScroll()" onclick="if(readMode === 'scroll') toggleReaderUI()">
            <div id="reader-flow" class="reader-text-body font-default"></div>
        </div>
        
        <div class="reader-ui reader-footer">
            <div style="display:flex; justify-content:space-around; align-items:center; width:100%;">
                <div class="nav-item" onclick="toggleOverlay('toc')"><i data-lucide="menu"></i><span>目录</span></div>
                <div id="reader-progress" style="font-size:14px; font-weight:900; color:var(--primary); background: var(--primary-light); padding: 4px 12px; border-radius: 12px;">0%</div>
                <div class="nav-item" onclick="toggleOverlay('set')"><i data-lucide="sliders-horizontal"></i><span>设置</span></div>
            </div>
        </div>
        <div id="overlay-toc" class="overlay">
            <div class="overlay-header"><span>章节目录</span><i data-lucide="x" size="24" onclick="toggleOverlay('toc')"></i></div>
            <div id="toc-container" style="overflow-y:auto; height:calc(100% - 75px); -webkit-overflow-scrolling: touch;"></div>
        </div>
        <div id="overlay-set" class="overlay">
            <div class="overlay-header"><span>设置</span><i data-lucide="x" size="24" onclick="toggleOverlay('set')"></i></div>
            
            <div class="setting-row">
                <span>字号大小</span>
                <div style="display:flex; gap:10px; align-items:center;">
                    <button class="mode-btn" onclick="changeFontSize(-2)">A-</button>
                    <span id="font-size-display" style="font-weight:900; width:30px; text-align:center;">22</span>
                    <button class="mode-btn" onclick="changeFontSize(2)">A+</button>
                </div>
            </div>

            <div class="setting-row">
                <span>阅读字体</span>
                <div style="display:flex; gap:10px;">
                    <button id="btn-font-default" class="font-btn mode-btn active" onclick="changeFont('default')">默认</button>
                    <button id="btn-font-serif" class="font-btn mode-btn" onclick="changeFont('serif')">宋体</button>
                    <button id="btn-font-kaiti" class="font-btn mode-btn" onclick="changeFont('kaiti')">楷体</button>
                </div>
            </div>

            <div class="setting-row">
                <span>加粗文字</span>
                <label class="switch">
                    <input type="checkbox" id="bold-font-toggle" onchange="toggleFontWeight(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-row">
                <span>阅读翻页</span>
                <div style="display:flex; gap:10px;">
                    <button id="btn-mode-paging" class="mode-btn" onclick="setReadMode('paging')">仿真</button>
                    <button id="btn-mode-scroll" class="mode-btn" onclick="setReadMode('scroll')">滚动</button>
                </div>
            </div>
            <div class="setting-row">
                <span>护眼背景</span>
                <div style="display:flex; gap:12px;">
                    <div class="bg-dot" style="background:#FDF6E3;" onclick="setReaderBg('#FDF6E3', '#2C2C2C', this)"></div>
                    <div class="bg-dot" style="background:#E6F3E6;" onclick="setReaderBg('#E6F3E6', '#2C2C2C', this)"></div>
                    <div class="bg-dot" style="background:#1A1917;" onclick="setReaderBg('#1A1917', '#D6D2C9', this)"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div id="feedback-modal" class="feedback-modal">
        <div class="feedback-content">
            <h3 style="font-weight:900;">意见反馈</h3>
            <p style="font-size:13px; color:var(--text-mute); margin-top:5px;">您的建议是我们前进的动力</p>
            <textarea id="feedback-text" class="feedback-textarea" placeholder="请在这里输入您的反馈内容..."></textarea>
            <div style="display:flex; gap:12px;">
                <button style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--border-color); background:transparent; font-weight:600;" onclick="closeFeedback()">取消</button>
                <button id="submit-feedback-btn" style="flex:2; padding:12px; border-radius:12px; border:none; background:var(--primary); color:white; font-weight:900;" onclick="submitFeedback()">提交反馈</button>
            </div>
        </div>
    </div>

    <script>

            userPfp: "https://i.ibb.co/sdYKDmWK/IMG-8552.png", 
            username: "Coming soon", 
            tagline: "Free bobux chat ?" 
        };

        const discordWebhookUrl = "";

        // --- BOOK DATA WITH INDIVIDUAL AUTHOR SETTINGS ---
        const BOOKS_DATA = {

                chapters: [

            "b2": { 
                name: "代码至尊", 
                authorName: "波比本尊", // Custom Name
                // If authorPfp is missing, it will use AUTHOR_CONFIG.pfp

                desc: "在这个以代码强弱划分等级的世界，波比是唯一掌握了零 Bug 秘籍的男人。", 
                chapters: [{t: "第一章 祭坛", c: `云端之巅，代码祭坛正散发着古老的数据波动...\n传说中，只有最纯粹的灵魂才能触碰那段禁忌的源代码。波比一步一步踏上阶梯，脚下的玉石台阶感应到了他的频率，发出悦耳的共鸣声。`}] 
            },
            "b3": { 
                name: "深夜食堂", 
                authorName: "波比厨师", // Custom Name
                authorPfp: "https://images.unsplash.com/photo-1599566150163-29194dcaad36?q=80&w=100&auto=format&fit=crop", // Custom PFP
                cover: "https://images.unsplash.com/photo-1512820790803-83ca734da794?q=60&w=150&auto=format&fit=crop", 
                desc: "一间只在深夜营业的食堂，波比老板用代码烹饪灵魂。", 
                chapters: [{t: "第一章 开业", c: `当时针指向十二点，偏僻小巷里的那盏红灯笼就会亮起...\n这里的菜谱没有名字，只有一段段温暖的数据指令。第一位客人推门而入，带着一身的疲惫和雨水的冰凉。`}] 
            }
        };

        const STORAGE = {
            SHELF: 'bobi_shelf_v5',
            PROGRESS: 'bobi_progress_v5', 
            TIMERS: 'bobi_timers_v5',
            MODE: 'bobi_read_mode_v5',
            THEME: 'bobi_theme_v5',
            FONTSIZE: 'bobi_font_size_v5',
            FONTWEIGHT: 'bobi_font_weight_v5',
            FONTFAMILY: 'bobi_font_family_v5' 
        };

        let shelf = JSON.parse(localStorage.getItem(STORAGE.SHELF) || '[]');
        let bookProgress = JSON.parse(localStorage.getItem(STORAGE.PROGRESS) || '{}');
        let bookTimers = JSON.parse(localStorage.getItem(STORAGE.TIMERS) || '{}');
        let readMode = localStorage.getItem(STORAGE.MODE) || 'paging';
        
        let currentFontSize = parseInt(localStorage.getItem(STORAGE.FONTSIZE) || '22');
        let isFontBold = localStorage.getItem(STORAGE.FONTWEIGHT) === 'true';
        let currentFontType = localStorage.getItem(STORAGE.FONTFAMILY) || 'default';

        let currentId = null, timerInterval = null, currentCh = 0;
        let currentPagingIdx = 0, totalPages = 1;
        let isNextChapterLoading = false; 

        window.onload = () => {
            initProfile();
            lucide.createIcons();
            renderList(Object.keys(BOOKS_DATA));
            renderShelf();
            updateStats();
            initTheme();
            applyReadMode(readMode);
            initFontSettings();
            
            setTimeout(() => {
                const s = document.getElementById('splash-screen');
                s.style.opacity = '0';
                setTimeout(() => s.style.display = 'none', 600);
            }, 1000);
            
            const readerFlow = document.getElementById('reader-flow');
            const resizeObserver = new ResizeObserver(() => {
                if (readMode === 'paging' && document.getElementById('reader-page').style.display === 'block') {
                    calcPaging();
                    applyPaging();
                }
            });
            resizeObserver.observe(readerFlow);
        };

        function initProfile() {
            document.getElementById('me-avatar-img').src = AUTHOR_CONFIG.userPfp;
            document.getElementById('me-username').innerText = AUTHOR_CONFIG.username;
            document.getElementById('me-tagline').innerText = AUTHOR_CONFIG.tagline;
        }

        function initFontSettings() {
            document.getElementById('font-size-display').innerText = currentFontSize;
            document.documentElement.style.setProperty('--reader-font-size', currentFontSize + 'px');
            
            const flow = document.getElementById('reader-flow');
            
            document.getElementById('bold-font-toggle').checked = isFontBold;
            if(isFontBold) flow.classList.add('bold-text');
            
            flow.classList.add('font-' + currentFontType);
            document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
            const activeFontBtn = document.getElementById('btn-font-' + currentFontType);
            if(activeFontBtn) activeFontBtn.classList.add('active');
        }

        function changeFontSize(delta) {
            currentFontSize += delta;
            if (currentFontSize < 14) currentFontSize = 14;
            if (currentFontSize > 36) currentFontSize = 36;
            
            document.getElementById('font-size-display').innerText = currentFontSize;
            document.documentElement.style.setProperty('--reader-font-size', currentFontSize + 'px');
            localStorage.setItem(STORAGE.FONTSIZE, currentFontSize);
            
            setTimeout(() => { 
                if(readMode === 'paging') { calcPaging(); applyPaging(); } 
            }, 50);
        }

        function toggleFontWeight(isBold) {
            isFontBold = isBold;
            const flow = document.getElementById('reader-flow');
            if(isBold) flow.classList.add('bold-text');
            else flow.classList.remove('bold-text');
            
            localStorage.setItem(STORAGE.FONTWEIGHT, isBold);
            
            setTimeout(() => { 
                if(readMode === 'paging') { calcPaging(); applyPaging(); } 
            }, 50);
        }

        function changeFont(type) {
            const flow = document.getElementById('reader-flow');
            flow.classList.remove('font-default', 'font-serif', 'font-kaiti');
            flow.classList.add('font-' + type);
            currentFontType = type;
            localStorage.setItem(STORAGE.FONTFAMILY, type);
            
            document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-font-' + type).classList.add('active');
            
            setTimeout(() => { 
                if(readMode === 'paging') { calcPaging(); applyPaging(); } 
            }, 50);
        }

        function renderList(ids) {
            const grid = document.getElementById('store-grid');
            grid.innerHTML = ids.map(id => `
                <div class="book-card" onclick="openDetail('${id}')">
                    <div class="book-cover-container"><img class="book-cover" src="${BOOKS_DATA[id].cover}" loading="lazy" decoding="async"></div>
                    <div class="book-title">${BOOKS_DATA[id].name}</div>
                </div>
            `).join('');
        }

        function renderShelf() {
            const grid = document.getElementById('shelf-grid');
            grid.innerHTML = shelf.length ? shelf.map(id => `
                <div class="book-card" onclick="openDetail('${id}')">
                    <div class="book-cover-container"><img class="book-cover" src="${BOOKS_DATA[id].cover}" loading="lazy" decoding="async"></div>
                    <div class="book-title">${BOOKS_DATA[id].name}</div>
                </div>
            `).join('') : '<div style="grid-column:1/4; text-align:center; padding:100px 0; color:var(--text-mute);">空空如也</div>';
        }

        function handleSearch(val) {
            const results = Object.keys(BOOKS_DATA).filter(id => 
                BOOKS_DATA[id].name.toLowerCase().includes(val.toLowerCase())
            );
            renderList(results);
        }

        function navTo(tab, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            el.classList.add('active');
            updateStats();
            lucide.createIcons();
        }

        function openDetail(id) {
            currentId = id; const b = BOOKS_DATA[id];
            document.getElementById('det-cover').src = b.cover;
            document.getElementById('det-title').innerText = b.name;
            
            // Logic to check if book has its own author settings
            document.getElementById('det-author').innerText = b.authorName || AUTHOR_CONFIG.name;
            document.getElementById('det-author-pfp').src = b.authorPfp || AUTHOR_CONFIG.pfp;
            
            document.getElementById('det-desc').innerText = b.desc;
            document.getElementById('shelf-btn').innerText = shelf.includes(id) ? '移出书架' : '加入书架';
            
            startBookTimer(id);
            const d = document.getElementById('book-detail');
            d.style.display = 'flex';
            setTimeout(() => d.style.transform = 'translateX(0)', 10);
            lucide.createIcons();
        }

        function startBookTimer(id) {
            clearInterval(timerInterval);
            if (!bookTimers[id]) bookTimers[id] = 0;
            const updateUI = () => {
                const s = bookTimers[id];
                const h = Math.floor(s / 3600).toString().padStart(2, '0');
                const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
                const sec = (s % 60).toString().padStart(2, '0');
                document.getElementById('cur-timer').innerText = `${h}:${m}:${sec}`;
            };
            updateUI();
            timerInterval = setInterval(() => {
                bookTimers[id]++;
                localStorage.setItem(STORAGE.TIMERS, JSON.stringify(bookTimers));
                updateUI();
            }, 1000);
        }

        function closeDetail() {
            clearInterval(timerInterval);
            const d = document.getElementById('book-detail');
            d.style.transform = 'translateX(100%)';
            setTimeout(() => d.style.display = 'none', 500);
        }

        function toggleShelf() {
            if(shelf.includes(currentId)) shelf = shelf.filter(i => i !== currentId);
            else shelf.push(currentId);
            localStorage.setItem(STORAGE.SHELF, JSON.stringify(shelf));
            document.getElementById('shelf-btn').innerText = shelf.includes(currentId) ? '移出书架' : '加入书架';
            renderShelf();
            updateStats();
        }

        function openReader() {
            const saved = bookProgress[currentId] || { ch: 0, page: 0, scrollY: 0 };
            currentCh = saved.ch;
            currentPagingIdx = saved.page || 0;
            
            loadCh(currentCh, false, saved);
            document.getElementById('reader-page').style.display = 'block';
            lucide.createIcons();
        }

        function loadCh(idx, goToLast = false, savedData = null, append = false) {
            const b = BOOKS_DATA[currentId];
            if(idx < 0 || idx >= b.chapters.length) return;
            
            if (!append) currentCh = idx;

            const processed = b.chapters[idx].c.split('\n').filter(l => l.trim()).map(l => `<p>${l.trim()}</p>`).join('');
            const flow = document.getElementById('reader-flow');
            
            const chapterHtml = `
                <div class="chapter-container" data-ch="${idx}">
                    <h2>${b.chapters[idx].t}</h2>
                    <div class="reader-content-inner">${processed}</div>
                    <div class="chapter-end-tag">— 本章完 —</div>
                </div>
            `;

            if (append) {
                flow.insertAdjacentHTML('beforeend', chapterHtml);
            } else {
                if(readMode === 'scroll') flow.style.transform = '';
                flow.innerHTML = chapterHtml;
                document.getElementById('reader-title').innerText = b.name;
            }
            
            renderTOC();
            
            requestAnimationFrame(() => {
                setTimeout(() => {
                    if(readMode === 'paging') {
                        calcPaging();
                        if (savedData && savedData.page !== undefined) currentPagingIdx = savedData.page;
                        else if(goToLast) currentPagingIdx = totalPages - 1;
                        else currentPagingIdx = 0;
                        
                        if (currentPagingIdx >= totalPages) currentPagingIdx = Math.max(0, totalPages - 1);
                        applyPaging();
                    } else if (!append) {
                        const view = document.getElementById('reader-scroll-view');
                        if (savedData && savedData.scrollY !== undefined) view.scrollTop = savedData.scrollY;
                        else if(goToLast) view.scrollTop = view.scrollHeight;
                        else view.scrollTop = 0;
                    }
                    if (!append) showHint(b.chapters[idx].t);
                    isNextChapterLoading = false;
                }, 50);
            });
        }

        function renderTOC() {
            const b = BOOKS_DATA[currentId];
            document.getElementById('toc-container').innerHTML = b.chapters.map((ch, i) => `
                <div style="padding:20px 25px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; ${i===currentCh?'color:var(--primary); font-weight:900; background:var(--primary-light);':''}" onclick="loadCh(${i}); toggleOverlay('toc');">
                    <span>${ch.t}</span>${i < currentCh ? '<i data-lucide="check" size="16"></i>' : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function calcPaging() {
            const flow = document.getElementById('reader-flow');
            const oldT = flow.style.transition;
            flow.style.transition = 'none';
            const scrollW = flow.scrollWidth;
            const winW = window.innerWidth;
            totalPages = Math.ceil(scrollW / winW) || 1;
            flow.style.transition = oldT;
            if (readMode === 'paging') updateReaderProgress();
        }

        function applyPaging() {
            if(readMode !== 'paging') return;
            document.getElementById('reader-flow').style.transform = `translateX(-${currentPagingIdx * 100}vw)`;
            updateReaderProgress();
            saveReaderProgress();
        }

        function handleReaderTap(dir) {
            if(readMode === 'paging') {
                if(dir === 'prev') {
                    if (currentPagingIdx > 0) { currentPagingIdx--; applyPaging(); }
                    else if (currentCh > 0) loadCh(currentCh - 1, true);
                } else {
                    if (currentPagingIdx < totalPages - 1) { currentPagingIdx++; applyPaging(); }
                    else if (currentCh < BOOKS_DATA[currentId].chapters.length - 1) loadCh(currentCh + 1);
                }
            }
        }

        function onReaderScroll() {
            if(readMode === 'scroll') {
                const view = document.getElementById('reader-scroll-view');
                const scrollPos = view.scrollTop + view.clientHeight;
                const threshold = view.scrollHeight - 300; 

                if (scrollPos > threshold && !isNextChapterLoading) {
                    const lastChInView = parseInt(document.querySelector('.chapter-container:last-child').dataset.ch);
                    if (lastChInView < BOOKS_DATA[currentId].chapters.length - 1) {
                        isNextChapterLoading = true;
                        loadCh(lastChInView + 1, false, null, true);
                    }
                }

                const chapters = document.querySelectorAll('.chapter-container');
                chapters.forEach(c => {
                    const rect = c.getBoundingClientRect();
                    if (rect.top < window.innerHeight / 2 && rect.bottom > window.innerHeight / 2) {
                        currentCh = parseInt(c.dataset.ch);
                    }
                });

                updateReaderProgress();
                saveReaderProgress();
            }
        }

        function updateReaderProgress() {
            const el = document.getElementById('reader-progress');
            if(readMode === 'paging') {
                el.innerText = `${currentPagingIdx + 1} / ${totalPages}`;
            } else {
                const v = document.getElementById('reader-scroll-view');
                const max = v.scrollHeight - v.clientHeight;
                const pct = max > 0 ? Math.round((v.scrollTop / max) * 100) : 0;
                el.innerText = pct + '%';
            }
        }

        function saveReaderProgress() {
            if(!currentId) return;
            const view = document.getElementById('reader-scroll-view');
            bookProgress[currentId] = {
                ch: currentCh,
                page: currentPagingIdx,
                scrollY: view.scrollTop
            };
            localStorage.setItem(STORAGE.PROGRESS, JSON.stringify(bookProgress));
        }

        function showHint(text) {
            const h = document.getElementById('page-hint');
            h.innerText = text; h.style.opacity = '1';
            setTimeout(() => h.style.opacity = '0', 1500);
        }

        function closeReader() { 
            document.getElementById('reader-page').style.display = 'none'; 
            document.querySelectorAll('.reader-ui').forEach(u => u.classList.remove('active'));
        }

        function toggleReaderUI() { document.querySelectorAll('.reader-ui').forEach(u => u.classList.toggle('active')); }
        function toggleOverlay(id) { document.getElementById('overlay-' + id).classList.toggle('active'); }

        function applyReadMode(mode) {
            readMode = mode;
            document.body.className = 'mode-' + mode;
            document.getElementById('reader-page').className = 'mode-' + mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-mode-' + mode).classList.add('active');
            localStorage.setItem(STORAGE.MODE, mode);
        }

        function setReadMode(mode) {
            applyReadMode(mode);
            loadCh(currentCh);
        }

        function setReaderBg(bg, text, el) {
            const p = document.getElementById('reader-page');
            p.style.background = bg; p.style.color = text;
            document.querySelectorAll('.bg-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleDarkMode(is) {
            const t = is ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem(STORAGE.THEME, t);
        }

        function initTheme() {
            const t = localStorage.getItem(STORAGE.THEME) || 'light';
            document.documentElement.setAttribute('data-theme', t);
            if(document.getElementById('dark-toggle')) document.getElementById('dark-toggle').checked = (t === 'dark');
        }

        function updateStats() {
            const totalSec = Object.values(bookTimers).reduce((a, b) => a + b, 0);
            document.getElementById('total-read-time').innerText = Math.floor(totalSec / 60);
            const uniqueProgressCount = Object.keys(bookProgress).length;
            document.getElementById('books-count').innerText = uniqueProgressCount;
        }

        function openFeedback() { document.getElementById('feedback-modal').style.display = 'flex'; }
        function closeFeedback() {
            document.getElementById('feedback-modal').style.display = 'none';
            document.getElementById('feedback-text').value = '';
        }

        async function submitFeedback() {
            const text = document.getElementById('feedback-text').value.trim();
            if (!text) return;
            const btn = document.getElementById('submit-feedback-btn');
            btn.innerText = "提交中..."; btn.disabled = true;
            if (!discordWebhookUrl) {
                setTimeout(() => {
                    btn.innerText = "提交成功";
                    setTimeout(() => { closeFeedback(); btn.innerText = "提交反馈"; btn.disabled = false; }, 1000);
                }, 800);
                return;
            }
            try {
                const response = await fetch(discordWebhookUrl, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ embeds: [{ title: "新意见反馈", description: text, color: 16344139, timestamp: new Date().toISOString() }] })
                });
                if (response.ok) {
                    btn.innerText = "提交成功";
                    setTimeout(() => { closeFeedback(); btn.innerText = "提交反馈"; btn.disabled = false; }, 1000);
                } else throw new Error();
            } catch (err) {
                btn.innerText = "提交失败"; btn.style.background = "#999";
                setTimeout(() => { btn.innerText = "提交反馈"; btn.style.background = "var(--primary)"; btn.disabled = false; }, 2000);
            }
        }
    </script>
</body>
</html>
